<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Clone | The ultimate gaming platform</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <a href="#" class="logo">
            <div class="logo-icon"></div>
            <span>STEAM</span>
        </a>

        <nav class="nav-group">
            <span class="nav-label">Menu</span>
            <a href="#" class="nav-link active">
                <i class="fa-solid fa-house"></i>
                <span>Store</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-layer-group"></i>
                <span>Library</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-users"></i>
                <span>Community</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-gamepad"></i>
                <span>Browse</span>
            </a>
        </nav>

        <nav class="nav-group">
            <span class="nav-label">Your Info</span>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-heart"></i>
                <span>Wishlist</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search for games...">
            </div>
            <div class="user-profile">
                <i class="fa-solid fa-bell"></i>
                <span>Tevoh</span>
                <div class="avatar"></div>
            </div>
        </header>

        <section class="hero">
            <img src="images/hero.png" alt="Featured Game" class="hero-img">
            <div class="hero-content">
                <span class="hero-tag">FEATURED & RECOMMENDED</span>
                <h1>Neon Velocity: Tokyo Drift</h1>
                <p style="margin-bottom: 2rem; color: var(--text-secondary); max-width: 600px;">Experience the most intense racing ever in the neon-lit streets of 2099. High stakes, high speed, and pure adrenaline.</p>
                <a href="#" class="hero-btn">Play Now</a>
            </div>
        </section>

        <div class="section-header">
            <h2>Special Offers</h2>
            <a href="#" style="color: var(--accent-blue); text-decoration: none; font-weight: 500;">See all</a>
        </div>

        <section class="game-grid" id="game-grid">

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
